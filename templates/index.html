<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Claude — واجهة محلية</title>
  <meta name="description" content="Claude AI local proxy interface"/>
  <meta name="theme-color" content="#0f1117"/>
  <link rel="icon" href="/static/icons/favicon.svg" type="image/svg+xml"/>
  <link rel="stylesheet" href="/static/css/style.css"/>
</head>
<body class="dark">

<!-- ── Sidebar ───────────────────────────────────────────── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <svg width="22" height="22" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="15" stroke="var(--accent)" stroke-width="2"/>
        <path d="M10 16 Q16 8 22 16 Q16 24 10 16Z" fill="var(--accent)" opacity="0.8"/>
      </svg>
      <span>Claude Local</span>
    </div>
    <button class="icon-btn" id="newConvBtn" title="محادثة جديدة">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
    </button>
  </div>

  <div class="conv-list" id="convList">
    <!-- conversations injected by JS -->
  </div>

  <div class="sidebar-footer">
    <div class="model-row">
      <label>النموذج:</label>
      <select id="modelSelect">
        {% for m in models %}
        <option value="{{ m }}" {% if m == default_model %}selected{% endif %}>{{ m }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="sidebar-actions">
      <button class="text-btn" id="themeToggle">🌙 المظهر</button>
      <button class="text-btn" id="exportBtn">📥 تصدير</button>
    </div>
    <div class="provider-badge">{{ provider | upper }}</div>
  </div>
</aside>

<!-- ── Mobile sidebar overlay ────────────────────────────── -->
<div class="overlay" id="overlay"></div>

<!-- ── Main ──────────────────────────────────────────────── -->
<main class="main">

  <!-- Top bar -->
  <header class="topbar">
    <button class="icon-btn menu-btn" id="menuBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="conv-title" id="convTitle">محادثة جديدة</div>
    <button class="icon-btn" id="settingsBtn" title="الإعدادات">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
      </svg>
    </button>
  </header>

  <!-- Messages area -->
  <div class="messages" id="messages">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>مرحباً بك في Claude Local</h2>
      <p>ابدأ محادثة جديدة أو اختر محادثة من القائمة الجانبية.</p>
      <div class="welcome-tips">
        <div class="tip">💡 يدعم تنسيق Markdown والكود البرمجي</div>
        <div class="tip">🌐 يعمل بدون إنترنت (الطلبات تذهب مباشرة لـ Anthropic)</div>
        <div class="tip">💾 المحادثات محفوظة محلياً</div>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <div class="input-wrapper">
      <textarea
        id="userInput"
        placeholder="اكتب رسالتك هنا... (Ctrl+Enter للإرسال)"
        rows="1"
        dir="auto"
      ></textarea>
      <button class="send-btn" id="sendBtn" disabled>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-meta">
      <span id="tokenCount">0 رمز</span>
      <button class="text-btn small" id="clearBtn">مسح</button>
    </div>
  </div>

</main>

<!-- ── Settings panel ──────────────────────────────────────── -->
<div class="panel" id="settingsPanel">
  <div class="panel-header">
    <h3>الإعدادات</h3>
    <button class="icon-btn" id="closePanelBtn">✕</button>
  </div>
  <label>System Prompt (تعليمات النظام)</label>
  <textarea id="systemPrompt" placeholder="اترك فارغاً للاستخدام الافتراضي..." rows="4"></textarea>
  <label>الحد الأقصى للرموز</label>
  <input type="number" id="maxTokens" value="1024" min="64" max="8192" step="64"/>
  <label>
    <input type="checkbox" id="streamToggle" checked/>
    تمكين الاستجابة المتدفقة (Streaming)
  </label>
  <button class="btn-primary" id="savePanelBtn">حفظ</button>
</div>
<div class="panel-overlay" id="panelOverlay"></div>

<!-- ── Scripts ─────────────────────────────────────────────── -->
<script src="/static/js/app.js"></script>
</body>
</html>
